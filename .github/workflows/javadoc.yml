name: Generate Javadoc and Deploy to Pages
on:
  push:
    branches:
      - stable
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate Javadoc
        run: mvn javadoc:javadoc

      - name: Diagnóstico - buscar Javadoc
        run: |
          echo "=== Contenido de target/ ==="
          find target -type d 2>/dev/null || echo "El directorio target/ no existe"

      - name: Verificar Javadoc generado
        run: |
          ls target/reports/apidocs || \
          ls target/site/apidocs || \
          (echo "ERROR: Javadoc no encontrado en ninguna ruta conocida" && exit 1)

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'target/reports/apidocs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

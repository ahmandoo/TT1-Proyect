<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Welcome</title>
</head>
	<body>
    	<form th:action="@{/solicitud}" method="post">
			<div th:each="entity : ${entities}">
			        <div>
			            <label th:for="${entity.id}" th:text="'Num. de' + ${entity.name} + ':'"></label>
			            <input type="number" min="0" th:id="${entity.id}" th:name="${entity.id}" />
			        </div>
			</div>
			<button type="submit">Solicitar</button>
			<nav>
				<a th:href="@{/logout}">Cerrar Sesión</a>
			</nav>
			<nav>
				<a th:href="@{/historial}">Ver Mi Historial de Simulaciones</a> |
				<a th:href="@{/correos/recibidos}">Bandeja de Entrada (Mensajes)</a> |
				<a th:href="@{/logout}">Cerrar Sesión</a>
			</nav>
		</form>
	</body>
</html>

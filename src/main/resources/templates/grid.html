<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
    	<title>Welcome</title>
		<style>
			.grid {
		  		display: grid;
		  		grid-template-columns: repeat(3, 50px);
		  		grid-gap: 5px;
			}

			.grid div {
		  		width: 50px;
		  		height: 50px;
			}
		</style>
	</head>
	<body>
	<div class="slider-container" style="margin-bottom: 15px;">
		<input type="range" id="mySlider" min="0" th:max="${maxTime}" value="0">
		<span id="sliderValue">0</span>
		<button id="playBtn" style="margin-left: 15px; padding: 5px 15px; cursor: pointer; font-weight: bold;">▶ Play</button>
	</div>
		<div class="grid" id='gr'></div>
		<script th:inline="javascript">
			const count = [[${count}]];
			const colors = [[${colors}]];
			function createSquares(){
				var grid = document.getElementById('gr');
				for(var i = 0; i < count; i++){
					for(var j = 0; j < count; j++){
				    	var node = document.createElement("div");
						node.id = i+'-'+j;
				      	node.style.background = colors['0-'+i+'-'+j]??'blue';
				      	grid.appendChild(node);
				    }
				}
				document.getElementsByClassName('grid').item(0).style.gridTemplateColumns = 'repeat('+count+',50px)';
			}
			createSquares();
			const slider = document.getElementById("mySlider");

			slider.addEventListener("input", function() {
				document.getElementById("sliderValue").textContent = slider.value;
		    	for(var y = 0; y < count; y++){
					for(var x = 0; x < count; x++){
						var node = document.getElementById(y+'-'+x);
						node.style.background = colors[slider.value+'-'+y+'-'+x]??'blue';
					}
				}
			});

			const playBtn = document.getElementById("playBtn");
			let playInterval;
			let isPlaying = false;

			playBtn.addEventListener("click", function() {
				if (isPlaying) {
					clearInterval(playInterval);
					playBtn.textContent = "▶ Play";
					isPlaying = false;
				} else {
					playBtn.textContent = "⏸ Pause";
					isPlaying = true;

					if (parseInt(slider.value) >= parseInt(slider.max)) {
						slider.value = 0;
						slider.dispatchEvent(new Event('input'));
					}

					playInterval = setInterval(function() {
						let currentValue = parseInt(slider.value);
						let maxValue = parseInt(slider.max);

						if (currentValue < maxValue) {
							slider.value = currentValue + 1;

							slider.dispatchEvent(new Event('input'));
						} else {
							clearInterval(playInterval);
							playBtn.textContent = "▶ Play";
							isPlaying = false;
						}
					}, 1000);
				}
			});
		</script>
	</body>
</html>
